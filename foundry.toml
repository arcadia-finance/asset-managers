[profile.default]
src = 'src'
out = 'out'
test = 'test'
libs = ['lib']
optimizer = true
optimizer_runs = 200
fuzz = { runs = 50, max_test_rejects = 100_000_000}
no_match_path = "**/{script/}*"
remappings = [
    "lib/accounts-v2/lib/openzeppelin-contracts-upgradeable-v4.9:@openzeppelin/=lib/accounts-v2/lib/openzeppelin-contracts-v4.9/",
    "lib/accounts-v2/lib/merkl-contracts:@openzeppelin/contracts/=lib/accounts-v2/lib/openzeppelin-contracts-v4.9/contracts/",
    "lib/accounts-v2/lib/merkl-contracts:@openzeppelin/contracts-upgradeable/=lib/accounts-v2/lib/openzeppelin-contracts-upgradeable-v4.9/contracts/",
    "lib/accounts-v2/lib/slipstream:@openzeppelin/=lib/accounts-v2/lib/slipstream/lib/openzeppelin-contracts/",
    "lib/accounts-v2/lib/v3-periphery:@openzeppelin/=lib/accounts-v2/lib/openzeppelin-contracts-v3.4/",
    "lib/accounts-v2/lib/swap-router-contracts:@openzeppelin/=lib/accounts-v2/lib/openzeppelin-contracts-v3.4/",
    "lib/accounts-v2/lib/v4-periphery:@openzeppelin/=lib/accounts-v2/lib/v4-periphery/lib/v4-core/lib/openzeppelin-contracts/",
    "lib/accounts-v2/lib/v4-periphery/lib/v4-core:@openzeppelin/=lib/accounts-v2/lib/v4-periphery/lib/v4-core/lib/openzeppelin-contracts/",
]
fs_permissions = [{ access = "read", path = "./out"}, { access = "write", path = "./script/out"}]
unchecked_cheatcode_artifacts = true
# Transient storage composability warning (known safe pattern in v4-core):
# - 2394: transient storage cleared at end of call
# Solmate deprecation warnings (used in deployed contracts via accounts-v2):
# - 2424: memory-safe-assembly natspec deprecated (FixedPointMathLib.sol, SafeTransferLib.sol, MerkleProofLib.sol)
# - 8429: virtual modifiers deprecated (Owned.sol, ReentrancyGuard.sol)
# Test files exceed max sizes:
# - 3860: Contract initcode size exceeds 49152 bytes
# - 4591: More than 256 warnings (meta-warning triggered by suppressed max size warnings)
# - 5574: Contract code size exceeds 24576 bytes
ignored_error_codes = [2394, 2424, 3860, 4591, 5574, 8429]
ignored_warnings_from = [
    "lib/accounts-v2/lib/slipstream/contracts/libraries/EnumerableSet.sol",
    "lib/cowprotocol/",
    "lib/flash-loan-router/",
]

[lint]
exclude_lints = [
    "asm-keccak256",
    "unsafe-cheatcode",
    "unwrapped-modifier-logic",
]
ignore = [
    "**/merkl/**/*",
    "**/merkl-operator/**/*",
]

[profile.lite]
src = 'src'
out = 'out'
test = 'test'
libs = ['lib']
optimizer = false
fuzz = { runs = 50, max_test_rejects = 100_000_000}

[fmt]
bracket_spacing = true
int_types = "long"
line_length = 120
number_underscore = "thousands"
quote_style = "double"
tab_width = 4

[profile.hf]
fuzz = { runs = 2_000, max_test_rejects = 1_000_000_000}

[profile.ci]
fuzz = { runs = 200, max_test_rejects = 100_000_000}
